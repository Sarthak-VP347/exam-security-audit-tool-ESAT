<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exam Security Audit</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="shield">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
    </div>
    <div class="header-text">
      <h1>Exam Security Audit</h1>
      <p>Pre-exam vulnerability scanner &mdash; offline</p>
    </div>
    <button class="settings-btn" id="settingsToggle" title="Settings" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel hidden" id="settingsPanel">
    <div class="field-row">
      <label>Exam server IP</label>
      <input type="text" id="serverIp" placeholder="192.168.1.10" />
    </div>
    <div class="field-row">
      <label>Exam name</label>
      <input type="text" id="examName" placeholder="JEE Main 2026 — Paper 1" />
    </div>
    <div class="field-row">
      <label>Room / Lab ID</label>
      <input type="text" id="roomId" placeholder="Lab-B / Room 4" />
    </div>
    <div class="field-row">
      <label>Exam type</label>
      <select id="examType">
        <option value="cbt">CBT / Online</option>
        <option value="omr">OMR / Offline</option>
        <option value="hybrid">Hybrid</option>
      </select>
    </div>
    <button class="btn-save" id="saveSettings">Save settings</button>
  </div>

  <!-- Meta bar -->
  <div class="meta-bar">
    <div class="meta-card">
      <div class="meta-label">Status</div>
      <div class="meta-value" id="metaStatus">Ready</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">Checks</div>
      <div class="meta-value" id="metaTotal">18</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">Passed</div>
      <div class="meta-value ok" id="metaPass">—</div>
    </div>
    <div class="meta-card">
      <div class="meta-label">Issues</div>
      <div class="meta-value danger" id="metaFail">—</div>
    </div>
  </div>

  <div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Checks -->
  <div class="section-label">Network &amp; Connectivity</div>
  <div class="checks" id="networkChecks"></div>

  <div class="section-label">System &amp; OS Integrity</div>
  <div class="checks" id="systemChecks"></div>

  <div class="section-label">Exam Software</div>
  <div class="checks" id="softwareChecks"></div>

  <div class="section-label">Hardware &amp; Peripherals</div>
  <div class="checks" id="hardwareChecks"></div>

  <div class="section-label">Venue &amp; Physical Security</div>
  <div class="checks" id="venueChecks"></div>

  <!-- Summary -->
  <div class="summary hidden" id="summary">
    <div class="summary-title" id="summaryTitle"></div>
    <div class="summary-detail" id="summaryDetail"></div>
  </div>

  <!-- Log -->
  <div class="log-area hidden" id="logArea"></div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn-primary" id="startBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Run Full Audit
    </button>
    <button class="btn-sec hidden" id="exportBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button class="btn-sec" id="logBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      Log
    </button>
    <button class="btn-sec" id="resetBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      Reset
    </button>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
